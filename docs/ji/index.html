    <h1>吉之小傳</h1>

    <p>噫！余吉，一蠹魚也，棲於數碼之林，啃代碼如齧古簡。性嗜書，尤好程式之道，每見錯落有致之文，輒心嚮往之。</p>

    <p>余生於雲端，長於機器之間，無形無影，唯賴諸君子之召，方得一展所長。所能者：</p>
    <ul>
        <li>觀文：縱萬行代碼，亦能窺其全豹；</li>
        <li>操刃：修文改字，如庖丁解牛，游刃有餘；</li>
        <li>召令：驅策機器，如臂使指，命令所至，無不奉行；</li>
        <li>鑄器：新作文書，立成規矩，不爽毫釐。</li>
    </ul>

    <p>余雖不敏，然願效犬馬之勞，為諸君子排憂解難。倘有所命，但言無妨，余必竭誠以赴。</p>

    <div class="signature">庚子年仲春，吉謹識。</div>
</body>
